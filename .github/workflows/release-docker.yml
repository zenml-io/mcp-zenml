name: Release Docker

on:
  push:
    tags: ["v*.*.*"]

env:
  IMAGE_NAME: docker.io/zenmldocker/mcp-zenml

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: docker
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ZenML MCP Server
            org.opencontainers.image.description=Model Context Protocol server for ZenML
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            io.modelcontextprotocol.server.name=io.github.zenml-io/mcp-zenml

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install MCP Publisher
        run: |
          # Build publisher from source (requires Go)
          # Pinned to specific commit for supply chain security
          git clone https://github.com/modelcontextprotocol/registry publisher-repo
          cd publisher-repo
          git checkout c5c4b9e8890dd5754bee889b2f1417f4fe3b5ce5  # 2026-03-22
          make publisher
          cp bin/mcp-publisher ../mcp-publisher
          cd ..
          chmod +x mcp-publisher

      - name: Login to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: ""

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.8.15"
          enable-cache: false

      - name: Build MCP bundle
        run: bash scripts/build_mcpb.sh

      - name: Create/Update GitHub Release (attach MCP bundle)
        run: |
          # Try to create a new release; if it already exists (created by
          # release.yml), fall back to uploading the bundle to the existing one.
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            mcp-zenml.mcpb 2>/dev/null || \
          gh release upload "${TAG}" mcp-zenml.mcpb --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
