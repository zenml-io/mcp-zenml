name: Release Docker

on:
  push:
    tags: ["v*.*.*"]

env:
  IMAGE_NAME: docker.io/zenmldocker/mcp-zenml

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: docker
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ZenML MCP Server
            org.opencontainers.image.description=Model Context Protocol server for ZenML
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            io.modelcontextprotocol.server.name=io.github.zenml-io/mcp-zenml

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install MCP Publisher
        run: |
          # Build publisher from source (requires Go)
          git clone https://github.com/modelcontextprotocol/registry publisher-repo
          cd publisher-repo
          make publisher
          cp bin/mcp-publisher ../mcp-publisher
          cd ..
          chmod +x mcp-publisher

      - name: Login to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: "20"
          cache: ""

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v5
        with:
          enable-cache: false

      - name: Build MCP bundle
        run: bash scripts/build_mcpb.sh

      - name: Create/Update GitHub Release (attach MCP bundle)
        run: |
          # Try to create a new release; if it already exists (created by
          # release.yml), fall back to uploading the bundle to the existing one.
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            mcp-zenml.mcpb 2>/dev/null || \
          gh release upload "${TAG}" mcp-zenml.mcpb --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
