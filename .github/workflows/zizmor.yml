name: GitHub Actions Security Analysis

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  # Weekly safety net to catch drift (runs Monday 3am UTC)
  schedule:
    - cron: "0 3 * * 1"
  # Allow manual triggering
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: Scan workflows with zizmor
    runs-on: ubuntu-latest
    # Only run on the main repo, not forks (scheduled runs would fail on forks)
    if: github.repository == 'zenml-io/mcp-zenml'
    permissions:
      contents: read
      actions: read
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.8.15"

      - name: Run zizmor
        run: uvx zizmor==1.25.2 --format=github --config=.github/zizmor.yml .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
